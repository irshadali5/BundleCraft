<thead data-lines="22,23">
<tr data-lines="22,23">
<th>Capability</th>
<th>Description</th>
</tr>
</thead>
<tbody data-lines="24,34">
<tr data-lines="24,25">
<td><strong>📦 Bundle to Single HTML</strong></td>
<td>Merge <code>.html</code>, <code>.css</code>, and <code>.js</code> files into one self-contained, portable HTML file</td>
</tr>
<tr data-lines="25,26">
<td><strong>🗂️ Unbundle to Files</strong></td>
<td>Extract inline <code>&lt;style&gt;</code> and <code>&lt;script&gt;</code> blocks into separate, well-organized source files</td>
</tr>
<tr data-lines="26,27">
<td><strong>🖱️ Drag &amp; Drop</strong></td>
<td>Intuitive drag-and-drop interface with visual hover states and file type detection</td>
</tr>
<tr data-lines="27,28">
<td><strong>⚡ Minification</strong></td>
<td>Optional CSS / JS / HTML minification to squeeze every byte out of your output</td>
</tr>
<tr data-lines="28,29">
<td><strong>🎨 Prettification</strong></td>
<td>Reverse mode: auto-format extracted code with clean indentation and structure</td>
</tr>
<tr data-lines="29,30">
<td><strong>👁️ Live Preview</strong></td>
<td>Real-time, sandboxed iframe preview of your bundled output</td>
</tr>
<tr data-lines="30,31">
<td><strong>🕐 History</strong></td>
<td>Persistent session history stored in <code>localStorage</code> — never lose track of past conversions</td>
</tr>
<tr data-lines="31,32">
<td><strong>🌗 Light &amp; Dark Mode</strong></td>
<td>Full terminal-inspired dark theme + clean light mode, with instant toggle</td>
</tr>
<tr data-lines="32,33">
<td><strong>⌨️ Keyboard Driven</strong></td>
<td>Power-user shortcuts for every major action</td>
</tr>
<tr data-lines="33,34">
<td><strong>📱 Responsive</strong></td>
<td>Collapsible sidebar and adaptive layout for mobile, tablet, and desktop</td>
</tr>
</tbody>
</table></div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(181, -109.4375)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="106" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="104" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="88" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">✨ Features</div></div></foreignObject></g><g data-depth="3" data-path="1.4.5" class="markmap-node" transform="translate(381, 25.9375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="251" y1="147.6875" y2="147.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="233" height="147"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><pre data-lines="41,49"><code class="language-bash"><span class="hljs-comment"># 1. Save the application</span>
